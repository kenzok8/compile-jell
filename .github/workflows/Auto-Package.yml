name: Auto-Packages

on: 
  repository_dispatch:
  # push: 
  #   branches:
  #     - master
  # schedule:
  #   - cron: 0 1 */1 * *

env:
  PPPOE_USERNAME: ${{ secrets.PPPOE_USERNAME }}
  PPPOE_PASSWD: ${{ secrets.PPPOE_PASSWD }}
  SCKEY: ${{ secrets.SCKEY }}
  REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
  REMOTE_SSH_HOST: ${{ secrets.REMOTE_SSH_HOST }}
  REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
  REMOTE_USER: ${{ secrets.REMOTE_USER }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  PASSWORD: ${{ secrets.PASSWORD }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
  B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
  B2_BUCKET: ${{ secrets.B2_BUCKET }}
  B2_PUBLIC_BASE_URL: ${{ secrets.B2_PUBLIC_BASE_URL }}
  B2_PATH_PREFIX: ${{ secrets.B2_PATH_PREFIX }}
  TZ: Asia/Shanghai

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id  
    runs-on: ubuntu-latest
    
    name: Build ${{matrix.target}}
    strategy:
      fail-fast: false
      matrix:
        target: ["${{ github.event.client_payload.target }}"]
        sdk: ["24.10", "25.12"]
        
    steps:
    - name: Checkout
      uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Load Settings.ini
      run: |
        source "${GITHUB_WORKSPACE}/devices/common/settings.ini"
        echo "REPO_URL=${REPO_URL}" >> $GITHUB_ENV
        echo "REPO_BRANCH=${REPO_BRANCH}" >> $GITHUB_ENV
        echo "CONFIG_FILE=${CONFIG_FILE}" >> $GITHUB_ENV
        echo "DIY_SH=${DIY_SH}" >> $GITHUB_ENV
        echo "FREE_UP_DISK=${FREE_UP_DISK}" >> $GITHUB_ENV
        echo "SSH_ACTIONS=${SSH_ACTIONS}" >> $GITHUB_ENV
        echo "UPLOAD_BIN_DIR_FOR_ARTIFACT=${UPLOAD_BIN_DIR_FOR_ARTIFACT}" >> $GITHUB_ENV
        echo "UPLOAD_FIRMWARE_FOR_ARTIFACT=${UPLOAD_FIRMWARE_FOR_ARTIFACT}" >> $GITHUB_ENV
        echo "UPLOAD_FIRMWARE_FOR_RELEASE=${UPLOAD_FIRMWARE_FOR_RELEASE}" >> $GITHUB_ENV
        echo "UPLOAD_FIRMWARE_TO_COWTRANSFER=${UPLOAD_FIRMWARE_TO_COWTRANSFER}" >> $GITHUB_ENV
        echo "UPLOAD_FIRMWARE_TO_WETRANSFER=${UPLOAD_FIRMWARE_TO_WETRANSFER}" >> $GITHUB_ENV
        if [[ "${{matrix.target}}" == arm_* ]]; then
        echo "REPO_TOKEN=${{ secrets.TOKEN_KENZO7 }}" >> $GITHUB_ENV
        else
        echo "REPO_TOKEN=${{ secrets.TOKEN_KENZO8 }}" >> $GITHUB_ENV
        fi
        sed -i "1a REPO_TOKEN=${{ env.REPO_TOKEN }}" ${GITHUB_WORKSPACE}/devices/common/custom.sh

    - name: Free disk space
      uses: coder-xiaomo/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Aggressive disk cleanup + diagnostics
      run: |
        echo "=== Disk before cleanup ==="
        df -hT
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /opt/ghc || true
        sudo rm -rf /usr/local/share/boost || true
        sudo rm -rf /usr/local/.ghcup || true
        sudo rm -rf /opt/hostedtoolcache/CodeQL || true
        sudo docker system prune -af --volumes || true
        sudo apt-get -qq autoremove --purge || true
        sudo apt-get -qq clean || true
        echo "=== Disk after cleanup ==="
        df -hT

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential libncurses-dev zlib1g-dev gawk git \
        gettext libssl-dev xsltproc rsync wget unzip \
        llvm python3-pyelftools libpython3-dev aria2 jq qemu-utils rename \
        libelf-dev libgmp3-dev libmpc-dev libfuse-dev bc autopoint cups-ppdc
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "Asia/Shanghai"

    - name: Get current date
      id: date
      run: |
        echo "date=$(date +'%Y.%m.%d-%H/%M')" >> $GITHUB_ENV
        echo "date2=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
        echo "date3=$(date +'%m.%d')" >> $GITHUB_ENV

    - name: Clone source code
      run: |
        set -v
        SDK_VER="${{ matrix.sdk }}"
        echo "SDK_VER=$SDK_VER" >> $GITHUB_ENV
        if [ "$SDK_VER" = "24.10" ]; then
          GCC="13.3.0"
          REPO_BRANCH="24.10-SNAPSHOT"
          FEEDS_BRANCH="openwrt-24.10"
        else
          GCC="14.3.0"
          REPO_BRANCH="25.12.0"
          FEEDS_BRANCH="openwrt-25.12"
        fi
        echo "GCC=$GCC" >> $GITHUB_ENV
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_ENV
        echo "FEEDS_BRANCH=$FEEDS_BRANCH" >> $GITHUB_ENV
        # echo "$REPO_BRANCH" moved above
        # echo "$REPO_BRANCH" moved above
        if [ ${{matrix.target}} == "mipsel_24kc" ]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/ramips/mt7621/openwrt-sdk-$REPO_BRANCH-ramips-mt7621_gcc-${GCC}_musl.Linux-x86_64.tar.zst
        elif [ ${{matrix.target}} == "mips_24kc" ]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/ath79/nand/openwrt-sdk-$REPO_BRANCH-ath79-nand_gcc-${GCC}_musl.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "x86_64" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/x86/64/openwrt-sdk-$REPO_BRANCH-x86-64_gcc-${GCC}_musl.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "i386_pentium4" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/x86/generic/openwrt-sdk-$REPO_BRANCH-x86-generic_gcc-${GCC}_musl.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "aarch64_generic" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/rockchip/armv8/openwrt-sdk-$REPO_BRANCH-rockchip-armv8_gcc-${GCC}_musl.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "arm_arm1176jzf-s_vfp" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/bcm27xx/bcm2708/openwrt-sdk-$REPO_BRANCH-bcm27xx-bcm2708_gcc-${GCC}_musl_eabi.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "arm_cortex-a15_neon-vfpv4" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/ipq806x/generic/openwrt-sdk-$REPO_BRANCH-ipq806x-generic_gcc-${GCC}_musl_eabi.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "arm_cortex-a5_vfpv4" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/at91/sama5/openwrt-sdk-$REPO_BRANCH-at91-sama5_gcc-${GCC}_musl_eabi.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "aarch64_cortex-a72" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/bcm27xx/bcm2711/openwrt-sdk-$REPO_BRANCH-bcm27xx-bcm2711_gcc-${GCC}_musl.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "aarch64_cortex-a53" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/mediatek/mt7622/openwrt-sdk-$REPO_BRANCH-mediatek-mt7622_gcc-${GCC}_musl.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "arm_cortex-a7_neon-vfpv4" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/ipq40xx/generic/openwrt-sdk-$REPO_BRANCH-ipq40xx-generic_gcc-${GCC}_musl_eabi.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "arm_cortex-a7" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/mediatek/mt7629/openwrt-sdk-$REPO_BRANCH-mediatek-mt7629_gcc-${GCC}_musl_eabi.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "arm_cortex-a9" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/bcm53xx/generic/openwrt-sdk-$REPO_BRANCH-bcm53xx-generic_gcc-${GCC}_musl_eabi.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "arm_cortex-a9_vfpv3-d16" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/mvebu/cortexa9/openwrt-sdk-$REPO_BRANCH-mvebu-cortexa9_gcc-${GCC}_musl_eabi.Linux-x86_64.tar.zst
        elif [[ ${{matrix.target}} == "aarch64_cortex-a76" ]]; then
            curl -fL -o sdk.tar.zst https://downloads.openwrt.org/releases/$REPO_BRANCH/targets/bcm27xx/bcm2712/openwrt-sdk-$REPO_BRANCH-bcm27xx-bcm2712_gcc-${GCC}_musl.Linux-x86_64.tar.zst
        fi

    - name: Free up disk space
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo mkdir -p -m 777 openwrt /mnt/openwrt/staging_dir /mnt/openwrt/build_dir /mnt/openwrt/bin  /mnt/openwrt/dl
        if [[ "$(echo "${{github.event.action}}" | grep "a-")" ]]; then
          ln -sf /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sf /mnt/openwrt/bin openwrt/bin
          ln -sf /mnt/openwrt/dl openwrt/dl
          ln -sf /mnt/openwrt/build_dir openwrt/build_dir
        fi
        df -hT
    
    - name: Load custom configuration
      run: |
        function git_clone_path() {
          trap 'rm -rf "$tmpdir"' EXIT
          branch="$1" rurl="$2" mv="$3"
          [[ "$mv" != "mv" ]] && shift 2 || shift 3
          rootdir="$PWD"
          tmpdir="$(mktemp -d)" || exit 1
          if [ ${#branch} -lt 10 ]; then
          git clone -b "$branch" --depth 1 --filter=blob:none --sparse "$rurl" "$tmpdir"
          cd "$tmpdir"
          else
          git clone --filter=blob:none --sparse "$rurl" "$tmpdir"
          cd "$tmpdir"
          git checkout $branch
          fi
          if [ "$?" != 0 ]; then
            echo "error on $rurl"
            exit 1
          fi
          git sparse-checkout init --cone
          git sparse-checkout set $@
          [[ "$mv" != "mv" ]] && cp -rn ./* $rootdir/ || mv -n $@/* $rootdir/$@/
          cd $rootdir
          }
        export -f git_clone_path
        tar -xJf sdk.tar.zst -C openwrt || tar -xf sdk.tar.zst -C openwrt
        rm -Rf sdk.tar.zst
        cd openwrt
        cp -rf ./openwrt-sdk*/. ./ 2>/dev/null || true
        cp -rf ./openwrt-sdk*/build_dir/. ./build_dir/ || true
        cp -rf ./openwrt-sdk*/staging_dir/. ./staging_dir/ || true
        cp -rf ../devices ./
        cp -rf devices/common/. ./
        cp -rf devices/${{matrix.target}}/. ./
        chmod -R +x devices/* || true
        sed -i -E "s#(https://github.com/openwrt/(openwrt|packages|luci)\\.git;).*#\\1${FEEDS_BRANCH}#" feeds.conf
        sed -i '/	refresh_config();/d' scripts/feeds
        ./scripts/feeds update -a
        find "devices/common/patches" -type f -name '*.b.patch' -print0 | sort -z | xargs -I % -t -0 -n 1 sh -c "cat '%'  | patch -d './' -p1 -E --forward --no-backup-if-mismatch"
        /bin/bash "devices/common/custom.sh"
        if [ -f "devices/${{matrix.target}}/custom.sh" ]; then
          /bin/bash "devices/${{matrix.target}}/custom.sh"
        fi
        find "devices/common/patches" -type f -name '*.patch' ! -name '*.b.patch' -print0 | sort -z | xargs -I % -t -0 -n 1 sh -c "cat '%'  | patch -d './' -p1 -E --forward --no-backup-if-mismatch"
        if [ -n "$(ls -A "devices/${{matrix.target}}/patches" 2>/dev/null)" ]; then
          find "devices/${{matrix.target}}/patches" -type f -name '*.patch' -print0 | sort -z | xargs -I % -t -0 -n 1 sh -c "cat '%'  | patch -d './' -p1 -E --forward --no-backup-if-mismatch"
        fi
        cp -Rf ./diy/* ./ || true
        if [ -f "devices/${{matrix.target}}/default-settings" ]; then
          echo >> package/*/*/my-default-settings/files/etc/uci-defaults/99-default-settings
          cat devices/${{matrix.target}}/default-settings >> package/*/*/my-default-settings/files/etc/uci-defaults/99-default-settings
        fi
        if [ -f "devices/${{matrix.target}}/.config" ]; then
          echo >> .config
          cat devices/${{matrix.target}}/.config >> .config
        fi
        sed -i '/^CONFIG_USE_APK=/d' .config
        if [ "$SDK_VER" = "25.12" ]; then
          echo 'CONFIG_USE_APK=y' >> .config
        else
          echo 'CONFIG_USE_APK=n' >> .config
        fi
        status=$(curl -H "Authorization: token ${{ env.REPO_TOKEN }}" -s "https://api.github.com/repos/kenzok8/small-package/actions/runs" | jq -r '.workflow_runs[0].status')
        while [ "$status" == "in_progress" ];do
          sleep 5
          status=$(curl -H "Authorization: token ${{ env.REPO_TOKEN }}" -s "https://api.github.com/repos/kenzok8/small-package/actions/runs" | jq -r '.workflow_runs[0].status')
        done
        make defconfig

    - name: SSH connection to Actions
      uses: kenzok78/debugger-action@master
      if: contains(github.event.action, 'ssh')

    - name: Prepare
      run: |
        cd openwrt
        mv -f package/feeds/jell jell.b
        mv -f feeds/packages/lang feeds/packages/lang.b
        mv -f feeds/packages feeds/packages.b
        mkdir package/feeds/jell
        cp -rf jell.b/{wxbase,lib*,rapidjson,nftables,jpcre2,toml11,gn,curl,quickjspp,qt*,libdouble*,libtorrent*,openssl,mbedtls,ppp,cups,nftables} package/feeds/jell/ || true

    - name: Compile preflight disk check
      run: |
        echo "=== Pre-compile disk usage ==="
        df -hT
        du -h -d1 openwrt 2>/dev/null | sort -hr | head -30 || true

    - name: Compile the firmware
      run: |
        cd openwrt
          echo -e "$(($(nproc)+1)) thread compile"
          fpkg="$(echo "${{github.event.action}}" | sed -e 's/\(aarch64_generic\|x86_64\|i386_pentium4\|arm_arm1176jzf-s_vfp\|aarch64_cortex-a72\|arm_cortex-a7\|arm_cortex-a7_neon-vfpv4\|arm_cortex-a9\|arm_cortex-a15_neon-vfpv4\|arm_cortex-a5_vfpv4\|mipsel_24kc\|mips_24kc\|aarch64_cortex-a53\|arm_xscale\|arm_cortex-a9_vfpv3-d16\| [0-9][0-9.]*\| ssh\| noser\| cw\)//g' | sed -e 's/ //g')"
          during="$(echo "${{github.event.action}}" | grep -o -E ' [0-9][0-9.]*' | sed -e 's/ //')"
          function comp(){
             echo "compile $ipk"
             cp -rf jell.b/$ipk package/feeds/jell/
             if [[ $ipk != luci-* ]]; then
              mv -f feeds/packages.b feeds/packages
              mv feeds/packages/lang.b feeds/packages/lang
              [ "$(grep "PKG_BUILD_DEPENDS" package/feeds/jell/$ipk/Makefile)" ] || mv feeds/packages/lang/node feeds/packages/lang/node.b
             fi
             (make package/$ipk/compile -j$(($(nproc)+1)) || make package/$ipk/compile V=s 2>&1 | tee error_$ipk.log | grep -i "Error 2" || rm -rf error_$ipk.log) || true
             if [[ $ipk != luci-* ]]; then
              mv -f feeds/packages/lang feeds/packages/lang.b 2>/dev/null || true
              mv -f feeds/packages/lang.b/node.b feeds/packages/lang.b/node 2>/dev/null || true
              mv -f feeds/packages feeds/packages.b
              rm -rf package/feeds/jell/$ipk
             fi
            }
          for ipk in $(ls jell.b | grep -E "$fpkg"); do
            echo $ipk
            if [[ "$fpkg" && ! "$during" ]]; then
              comp
            else
              gitdate="$(curl -H "Authorization: token ${{ env.REPO_TOKEN }}" -s "https://api.github.com/repos/kenzok8/jell/commits?path=$ipk&per_page=1" | jq -r '.[0].commit.committer.date')" || true
              if [[ "$gitdate" && "$gitdate" != null ]]; then
                gitdate="$(date -d "$gitdate" +%s)"
                now="$(date -d "$(date)" +%s)"
                [ "$during" ] || during="1.05"
                durings=`echo "$during*60*60*24" | bc`
                if [[ $(($gitdate + ${durings%.*})) -gt $now && $ipk != luci-base && $ipk != luci-mod-* ]]; then
                  echo "$((($now - $gitdate)/60/60))" || true
                  echo "$ipk" >> ipk.txt
                fi
              fi
            fi
          done
          if [ -f ipk.txt ]; then
              for ipk in $(cat ipk.txt)
              do
                comp
              done
          fi
        echo "status=success" >> $GITHUB_ENV

    - name: Check space usage
      run: df -hT

    - name: Generate package index
      run: |
        cd openwrt
        make package/index V=s

    - name: Organize files
      id: organize
      run: |
        mkdir -p packages

        PKG_DIR="openwrt/bin/packages"
        if [ -d "$PKG_DIR" ]; then
          echo "Searching for packages in ${PKG_DIR} ..."
          count=0
          find "$PKG_DIR" -path "*/jell/*" \( -name '*.ipk' -o -name '*.apk' \) -type f | while IFS= read -r f; do
            echo "  found: $f"
            cp -v "$f" packages/
            count=$((count + 1))
          done
          echo "Collected packages: $count"
        else
          echo "WARNING: ${PKG_DIR} does not exist"
        fi

        cp -f openwrt/.config "packages/${{matrix.target}}.config" 2>/dev/null || true

        pkg_count=$(find packages -maxdepth 1 -type f \( -name '*.ipk' -o -name '*.apk' \) 2>/dev/null | wc -l)
        echo "Total packages: ${pkg_count}"
        if [ "$pkg_count" -eq 0 ]; then
          echo "SKIP_B2_UPLOAD=true" >> $GITHUB_ENV
        fi

        echo "FIRMWARE=$PWD/packages" >> $GITHUB_ENV
        Emoji=("🍂" "🐾" "🌸" "🐌" "🌿" "🐤" "💦" "💤" "💭" "⛅" "🌈" "🔥" "🍭" "🎉" "🤞" "✨" "🎁" "🎈" "🎨" "💋" "🍓" "🍕" "🍉" "💐" "🌴" "🙈" "🤡" "🍡")
        echo "EMOJI=${Emoji[$[$RANDOM % ${#Emoji[@]}]]}" >> $GITHUB_ENV
        if [[ $(ls -l openwrt/error* 2>/dev/null | grep "^-" | wc -l) -le 0 ]]; then
           echo "NAME=${Emoji[$[$RANDOM % ${#Emoji[@]}]]} ${{ env.date2 }} ${{matrix.target}} ${{ env.EMOJI }}" >> $GITHUB_ENV
        else
           echo "NAME=🌸 ${{ env.date2 }} ${{matrix.target}} 🌸" >> $GITHUB_ENV
        fi

    - name: Upload firmware to cowtransfer
      if: env.UPLOAD_FIRMWARE_TO_COWTRANSFER == 'true'
      continue-on-error: true
      run: |
        curl -fsSL git.io/file-transfer | sh
        cowurl=$(./transfer cow --block 2621440 -s --no-progress ${FIRMWARE})
        cowurl=$(echo $cowurl | grep -o -E "https[^ ]*")
        echo "COWURL=$cowurl" >> $GITHUB_ENV
        echo "Download Link: ${{ env.EMOJI }} $cowurl ${{ env.EMOJI }} 💤"
 
    - name: Upload firmware to WeTransfer
      if: env.UPLOAD_FIRMWARE_TO_WETRANSFER == 'true'
      continue-on-error: true
      run: |
        curl -fsSL git.io/file-transfer | sh
        wetrans=$(./transfer wet -s -p 16 --no-progress ${FIRMWARE})
        wetrans=$(echo $wetrans | grep -o -E "https[^ ]*")
        echo "WETRANS=$wetrans" >> $GITHUB_ENV
        echo "Download Link: ${{ env.EMOJI }} $wetrans ${{ env.EMOJI }} 💤"
        
    - name: Create release
      id: create_release
      if: env.REPO_TOKEN && env.UPLOAD_FIRMWARE_FOR_RELEASE == 'true'
      continue-on-error: true
      run: |
        B2_BASE_URL="${{ env.B2_PUBLIC_BASE_URL }}"
        [ -z "$B2_BASE_URL" ] && B2_BASE_URL="https://down.dllkids.xyz"
        echo -e "定时更新插件，推送发布 🎈:\n" >> release.txt
        echo -e "[下载链接] (${B2_BASE_URL%/}/openwrt-feed/jell/${{ env.SDK_VER }}/${{matrix.target}}/)\n" >> release.txt
        [ ${{ env.WETRANS }} ] && echo -e "[WeTransfer] (${{ env.WETRANS }} 🗽)\n" >> release.txt
        [ ${{ env.COWURL }} ] && echo -e "[奶牛上传] (${{ env.COWURL }} 🐮)\n" >> release.txt
        [ ${{ env.NOTICE }} ] && echo -e "${{ env.NOTICE }}" >> release.txt || true

    - name: Upload packages for release
      uses: softprops/action-gh-release@v2
      continue-on-error: true
      if: env.REPO_TOKEN && env.UPLOAD_FIRMWARE_FOR_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.TOKEN_KENZO }}
      with:
        files: |
            packages/*
            openwrt/error*.log
        name: ${{ env.NAME }}
        tag_name: ${{ env.date }}_${{matrix.target}}
        body_path: release.txt

    - name: Upload packages for artifact
      uses: actions/upload-artifact@main
      continue-on-error: true
      if: env.UPLOAD_FIRMWARE_FOR_ARTIFACT == 'true'
      with:
        name: ${{ env.date3 }} ${{matrix.target}}
        path: packages

    - name: Upload packages to Backblaze B2
      if: ${{ ! contains(github.event.action, 'noser') && env.SKIP_B2_UPLOAD != 'true' }}
      run: |
        set -euo pipefail
        [ -n "${{ env.B2_KEY_ID }}" ] || { echo "Missing B2_KEY_ID"; exit 1; }
        [ -n "${{ env.B2_APPLICATION_KEY }}" ] || { echo "Missing B2_APPLICATION_KEY"; exit 1; }
        [ -n "${{ env.B2_BUCKET }}" ] || { echo "Missing B2_BUCKET"; exit 1; }

        curl -fsSL https://rclone.org/install.sh | sudo bash
        mkdir -p ~/.config/rclone
        cat > ~/.config/rclone/rclone.conf <<EOF
        [b2]
        type = b2
        account = ${{ env.B2_KEY_ID }}
        key = ${{ env.B2_APPLICATION_KEY }}
        hard_delete = true
        EOF

        pkg_count=$(find packages -maxdepth 1 -type f \( -name '*.ipk' -o -name '*.apk' \) | wc -l)
        echo "Uploading ${pkg_count} packages to openwrt-feed/jell/${{ env.SDK_VER }}/${{matrix.target}}/ ..."
        rclone copy packages/ "b2:${{ env.B2_BUCKET }}/openwrt-feed/jell/${{ env.SDK_VER }}/${{matrix.target}}/" \
          --checksum --fast-list --transfers 8 --checkers 16

        echo "Verifying upload ..."
        REMOTE="b2:${{ env.B2_BUCKET }}/openwrt-feed/jell/${{ env.SDK_VER }}/${{matrix.target}}"
        remote_count=$(rclone lsf "$REMOTE" --files-only | wc -l)
        echo "Remote has ${remote_count} files"
        [ "$remote_count" -gt 0 ] || { echo "ERROR: upload verification failed, no files at remote"; exit 1; }
        echo "Upload verified OK"

    - name: Generate website index page
      if: ${{ ! contains(github.event.action, 'noser') }}
      run: |
        set -euo pipefail
        B2_BASE_URL="${{ env.B2_PUBLIC_BASE_URL }}"
        [ -z "$B2_BASE_URL" ] && B2_BASE_URL="https://down.dllkids.xyz"
        TARGET_DIR="website-index/${{ env.SDK_VER }}/${{ matrix.target }}"
        mkdir -p "$TARGET_DIR"
        INDEX_FILE="${TARGET_DIR}/index.html"
        LINK_PREFIX="${B2_BASE_URL%/}/openwrt-feed/jell/${{ env.SDK_VER }}/${{ matrix.target }}"
        RCLONE_REMOTE="b2:${{ env.B2_BUCKET }}/openwrt-feed/jell/${{ env.SDK_VER }}/${{ matrix.target }}"
        {
          printf '<!DOCTYPE html>\n<html><head><meta charset="utf-8"><meta http-equiv="x-ua-compatible" content="IE=edge">\n'
          printf '<title>OpenWrt固件与插件</title><meta name="viewport" content="width=device-width, initial-scale=1">\n'
          printf '<link rel="stylesheet" href="/Nginx-Fancyindex-Theme-dark/styles.css?v=20260224b">\n'
          printf '<script type="text/javascript" src="/Nginx-Fancyindex-Theme-dark/jquery.min.js"></script>\n'
          printf '</head><body class="theme-dark"><div id="raw_include_HEADER_md"></div>\n'
          printf '<h1>OpenWrt固件插件: /openwrt-feed/jell/%s/%s/</h1>\n' "${{ env.SDK_VER }}" "${{ matrix.target }}"
          printf '<table id="list"><thead><tr><th style="width:55%%">File Name</th><th style="width:20%%">File Size</th><th style="width:25%%">Date</th></tr></thead><tbody>\n'
          printf '<tr><td class="link"><a href="../">Parent directory/</a></td><td class="size">-</td><td class="date">-</td></tr>\n'
          rclone lsf "$RCLONE_REMOTE/" --files-only --format pst --separator "$(printf '\t')" | sort | while IFS="$(printf '\t')" read -r name size mtime; do
            url_name="$(jq -nr --arg name "$name" '$name|@uri')"
            href="${LINK_PREFIX}/${url_name}"
            printf '<tr><td class="link"><a href="%s" title="%s">%s</a></td><td class="size">%s</td><td class="date">%s</td></tr>\n' "$href" "$name" "$name" "$size" "$mtime"
          done
          printf '</tbody></table><div id="raw_include_README_md"></div>\n'
          printf '<footer><a href="https://github.com/kenzok8/openwrt_Build">GitHub仓库</a></footer>\n'
          printf '<footer><a href="https://github.com/kenzok8">作者kenzo</a></footer>\n'
          printf '<script src="https://unpkg.com/xregexp/xregexp-all.js"></script>\n'
          printf '<script type="text/javascript" src="/Nginx-Fancyindex-Theme-dark/addNginxFancyIndexForm.js?v=20260224h"></script>\n'
          printf '<script type="text/javascript" src="/Nginx-Fancyindex-Theme-dark/showdown.min.js"></script>\n'
          printf '</body></html>\n'
        } > "$INDEX_FILE"

    - name: Upload index.html to B2
      if: ${{ ! contains(github.event.action, 'noser') }}
      run: |
        set -euo pipefail
        INDEX_FILE="website-index/${{ env.SDK_VER }}/${{ matrix.target }}/index.html"
        [ -f "$INDEX_FILE" ] || { echo "no index.html, skip"; exit 0; }
        rclone copyto "$INDEX_FILE" \
          "b2:${{ env.B2_BUCKET }}/openwrt-feed/jell/${{ env.SDK_VER }}/${{matrix.target}}/index.html" \
          --checksum
        echo "index.html uploaded to B2"

    - name: Upload website index page to VPS temp
      uses: appleboy/scp-action@master
      continue-on-error: true
      if: env.SSH_PRIVATE_KEY && env.REMOTE_SSH_HOST && env.REMOTE_USER && ! contains(github.event.action, 'noser')
      with:
        host: ${{ env.REMOTE_SSH_HOST }}
        port: ${{ env.REMOTE_PORT }}
        username: ${{ env.REMOTE_USER }}
        key: ${{ env.SSH_PRIVATE_KEY }}
        source: "website-index/${{ env.SDK_VER }}/${{ matrix.target }}/index.html"
        target: "/tmp/compile-jell-feed-index/${{ github.run_id }}-${{ github.run_attempt }}/${{ env.SDK_VER }}/${{ matrix.target }}"
        strip_components: 3

    - name: Install website index page
      uses: appleboy/ssh-action@master
      continue-on-error: true
      if: env.SSH_PRIVATE_KEY && env.REMOTE_SSH_HOST && env.REMOTE_USER && env.REMOTE_HOST && ! contains(github.event.action, 'noser')
      with:
        host: ${{ env.REMOTE_SSH_HOST }}
        port: ${{ env.REMOTE_PORT }}
        username: ${{ env.REMOTE_USER }}
        key: ${{ env.SSH_PRIVATE_KEY }}
        script: |
          set -e
          WEB_ROOT="/www/wwwroot/${{ env.REMOTE_HOST }}/openwrt-feed/jell"
          SRC="/tmp/compile-jell-feed-index/${{ github.run_id }}-${{ github.run_attempt }}/${{ env.SDK_VER }}/${{ matrix.target }}/index.html"
          DST="${WEB_ROOT}/${{ env.SDK_VER }}/${{ matrix.target }}"
          sudo mkdir -p "$DST"
          sudo install -o www -g www -m 0644 "$SRC" "$DST/index.html"
          sudo touch "${WEB_ROOT}/${{ env.SDK_VER }}/.keep" "$DST/.keep"

